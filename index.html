<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>67 — Caped Original</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#111;color:#eee;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
  header{position:fixed;top:0;left:0;right:0;padding:14px 18px;z-index:5;
    background:linear-gradient(#111 55%,transparent);letter-spacing:.04em}
  header b{font-weight:600}
  header span{color:#888;margin-left:10px;font-size:12px}
  model-viewer{width:100%;height:100%;background:#111;--poster-color:#111}
</style>
<header><b>67 — Caped Original</b><span>original asset, cape added</span></header>
<model-viewer
  src="model.glb"
  alt="67 character with cape"
  camera-controls
  touch-action="pan-y"
  shadow-intensity="0.9"
  exposure="1.05"
  environment-image="neutral"
  camera-orbit="0deg 82deg 4.2m"
  min-camera-orbit="auto 0deg auto"
  max-camera-orbit="auto 180deg auto"
  field-of-view="28deg">
</model-viewer>
